name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: dspng.exe
            asset_name: dspng-windows-amd64.exe
            add_data_sep: ";"
          - os: macos-latest
            artifact: dspng
            asset_name: dspng-macos-amd64
            add_data_sep: ":"
          - os: ubuntu-latest
            artifact: dspng
            asset_name: dspng-linux-amd64
            add_data_sep: ":"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv add --dev pyinstaller

      - name: Build with PyInstaller
        run: >
          uv run pyinstaller
          --onefile
          --windowed
          --name dspng
          --add-data icon.ico${{ matrix.add_data_sep }}.
          --distpath dist
          --workpath tmp/build
          --clean
          src/dspng/main.py

      - name: Rename artifact
        run: mv dist/${{ matrix.artifact }} dist/${{ matrix.asset_name }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate changelog
        id: changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git-cliff -s all -l >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: artifacts/**/*
