name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: dspng.exe
            asset_name: dspng-windows-amd64.exe
          - os: macos-latest
            artifact: dspng
            asset_name: dspng-macos-amd64
          - os: ubuntu-latest
            artifact: dspng
            asset_name: dspng-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv add --dev pyinstaller

      - name: Build with PyInstaller
        run: >
          uv run pyinstaller
          --onefile
          --windowed
          --name dspng
          --add-data "icon.ico;."
          --distpath dist
          --workpath tmp/build
          --clean
          src/dspng/main.py

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/dspng dist/${{ matrix.asset_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/dspng.exe dist/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
