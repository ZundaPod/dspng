name: Clean up

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  clean-up:
    runs-on: ubuntu-latest
    steps:
      - name: Delete tag and release
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: "v${{ inputs.version }}"
          github_token: ${{ secrets.GITHUB_TOKEN }}
