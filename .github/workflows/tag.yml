name: Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer (e.g. 1.0.0). Auto-generated if omitted."
        type: string

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.output-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get previous tag
        id: check-tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          dry_run: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Output the version
        id: output-version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.check-tag.outputs.new_version }}" >> $GITHUB_OUTPUT
          fi

  tag-changelog:
    runs-on: ubuntu-latest
    needs: check-version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.PAT }}

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate changelog
        run: git-cliff -t ${{ needs.check-version.outputs.version }} -o CHANGELOG.md

      - name: Sync version to pyproject.toml
        run: sed -i "s/^version = \"[^\"]*\"/version = \"${{ needs.check-version.outputs.version }}\"/" pyproject.toml

      - name: Sync version to main.py
        run: sed -i "s/setApplicationVersion(\"[^\"]*\")/setApplicationVersion(\"${{ needs.check-version.outputs.version }}\")/" src/dspng/main.py

      - name: Commit changelog and version sync
        id: add-changelog
        uses: EndBug/add-and-commit@v10
        with:
          add: "CHANGELOG.md pyproject.toml src/dspng/main.py"
          author_name: github-actions[bot]
          author_email: 41898282+github-actions[bot]@users.noreply.github.com
          message: "release: bump to ${{ needs.check-version.outputs.version }}"

      - name: Create tag
        uses: mathieudutour/github-tag-action@v6.2
        if: steps.add-changelog.outputs.committed == 'true'
        with:
          commit_sha: ${{ steps.add-changelog.outputs.commit_long_sha }}
          custom_tag: ${{ needs.check-version.outputs.version }}
          github_token: ${{ secrets.PAT }}
