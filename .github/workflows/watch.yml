name: Watch

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  check-changed:
    runs-on: ubuntu-latest
    outputs:
      modified: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6
      - name: Check changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            src/**/*.py
            pyproject.toml

  build:
    needs: check-changed
    if: needs.check-changed.outputs.modified == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: dspng.exe
            asset_name: dspng-windows-amd64.exe
          - os: macos-latest
            artifact: dspng
            asset_name: dspng-macos-amd64
          - os: ubuntu-latest
            artifact: dspng
            asset_name: dspng-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --dev

      - name: Build with PyInstaller
        run: uv run scripts/build.py

      - name: Rename artifact
        run: mv dist/${{ matrix.artifact }} dist/${{ matrix.asset_name }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
