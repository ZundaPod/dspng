name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  check-changed:
    runs-on: ubuntu-latest
    outputs:
      modified: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Check changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            src/**/*.py
            pyproject.toml

  check:
    runs-on: ubuntu-latest
    needs: check-changed
    if: needs.check-changed.outputs.modified == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Check imports
        run: uv run python -c "from dspng.ui.main_window import MainWindow; print('OK')"

      - name: Check syntax
        run: uv run python -m py_compile src/dspng/main.py
