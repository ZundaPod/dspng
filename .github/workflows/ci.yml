name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Check imports
        run: uv run python -c "from dspng.ui.main_window import MainWindow; print('OK')"

      - name: Check for syntax errors
        run: uv run python -m py_compile src/dspng/main.py
